name: HexAgent CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 mypy
        
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics --ignore=E501,E302,W293
        
    - name: Type check with mypy
      run: |
        mypy .
        
    - name: Test import and entrypoint
      run: |
        python hexagent.py --engagement eng-test-01 || exit 1

  build-and-release:
    needs: test-and-lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    # Normally we would build a docker image or package here
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      # Only run if secrets are configured
      continue-on-error: true
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build and push Docker image
      # Only run if docker login succeeded (which requires secrets)
      continue-on-error: true
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: hexagent/agent:latest
